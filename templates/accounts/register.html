{% extends 'base_auth.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-10 rounded-2xl w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-bold text-indigo-400 mb-2">⚡ CareerForge AI</h1>
        <p class="text-gray-400 mb-8">Create your account</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password1" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
                <input type="password" name="password2" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition">
                Create Account
            </button>
        </form>

        <p class="text-gray-400 text-center mt-6">
            Already have an account?
            <a href="/accounts/login/" class="text-indigo-400 hover:underline">Login</a>
        </p>
    </div>
</div>
{% endblock %}
