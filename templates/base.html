<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerForge AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen">
    <div class="flex">
        <aside class="w-64 bg-gray-900 min-h-screen p-6 fixed">
            <h1 class="text-2xl font-bold text-indigo-400 mb-10">⚡ CareerForge</h1>
            <nav class="flex flex-col gap-3">
                <a href="/dashboard/" class="hover:text-indigo-400 transition">🏠 Dashboard</a>
                <a href="/dashboard/resume/" class="hover:text-indigo-400 transition">📄 Resume Analyzer</a>
                <a href="/internships/" class="hover:text-indigo-400 transition">💼 Internships</a>
                <a href="/skills/" class="hover:text-indigo-400 transition">🧠 Skill Gap</a>
                <a href="/roadmap/" class="hover:text-indigo-400 transition">🗺️ Roadmap</a>
                <a href="/interview/" class="hover:text-indigo-400 transition">🎯 Interview Prep</a>
                <a href="/tracker/" class="hover:text-indigo-400 transition">📋 Tracker</a>
                <a href="/score/" class="hover:text-indigo-400 transition">🏆 Placement Score</a>
            </nav>
            <div class="absolute bottom-6">
                <a href="/accounts/logout/" class="text-red-400 hover:text-red-300 transition">🚪 Logout</a>
            </div>
        </aside>
        <main class="ml-64 p-8 w-full">
            {% if messages %}
            {% for message in messages %}
            <div
                class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-500{% else %}bg-green-500{% endif %} text-white">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
